# Copy this file into YOUR repo as .github/workflows/build-and-push.yml
#
# On every push to main it builds the Docker image and pushes it to GHCR
# under your account, tagged with the commit SHA (immutable, traceable)
# and with latest (convenience pointer).
#
# Authentication: the built-in GITHUB_TOKEN. No PAT, no secret to create.
# The single line that authorizes the push is `packages: write` below.
name: build-and-push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-ghcr:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/hello-ghcr:latest
